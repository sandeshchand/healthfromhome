services:
  db:
    image: postgres:16
    container_name: healthfromhome_db
    restart: always
    environment:
      POSTGRES_DB: healthfromhome
      POSTGRES_USER: healthfromhome_user
      POSTGRES_PASSWORD: healthfromhome_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7
    container_name: healthfromhome_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: